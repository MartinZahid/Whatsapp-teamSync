<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Team Sync</title>
</head>
<body>
  <div class="container">
    <h2>
      <img src="../icons/icon-48.png" alt="Logo" width="20" height="20" style="border-radius:4px">
      WhatsApp Team Sync
    </h2>

    <div id="current-agent-bar" class="current-agent-bar hidden">
      <div class="status-row">
        <span class="status-dot" id="status-dot"></span>
        <div>
          <div id="display-name" class="current-name"></div>
          <span id="status-text" class="status-label">Conectando...</span>
        </div>
      </div>
      <span class="badge" id="status-badge">-</span>
    </div>

    <div id="setup-view">
      <p class="section-title">Selecciona tu agente</p>

      <div id="agent-list" class="agent-list">
        <!-- Agent items rendered by JS -->
      </div>

      <button id="add-agent-btn" class="btn btn-add">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Añadir agente
      </button>

      <div id="add-agent-form" class="add-form hidden">
        <input type="text" id="new-agent-input" placeholder="Nombre del nuevo agente" maxlength="30" autocomplete="off">
        <div class="add-form-actions">
          <button id="confirm-add-btn" class="btn btn-sm btn-primary">Añadir</button>
          <button id="cancel-add-btn" class="btn btn-sm btn-secondary">Cancelar</button>
        </div>
      </div>

      <div class="divider"><span>o</span></div>

      <div class="custom-name-row">
        <input type="text" id="custom-name-input" placeholder="Escribe un nombre personalizado..." maxlength="30" autocomplete="off">
        <button id="connect-custom-btn" class="btn btn-primary btn-sm">Conectar</button>
      </div>
    </div>

    <div class="action-buttons" id="action-buttons">
      <button id="help-btn" class="btn btn-help" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 16v-4M12 8h.01"/>
        </svg>
        Pedir ayuda
      </button>
      <button id="cancel-help-btn" class="btn btn-cancel-help" disabled hidden>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        Cancelar ayuda
      </button>
      <button id="pause-btn" class="btn btn-pause" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="4" width="4" height="16"/>
          <rect x="14" y="4" width="4" height="16"/>
        </svg>
        Pausar
      </button>
      <button id="resume-btn" class="btn btn-resume" disabled hidden>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        Disponible
      </button>
      <button id="change-agent-btn" class="btn btn-change">Cambiar de agente</button>
    </div>

    <div id="connected-view" class="hidden">
      <div id="server-status" class="server-status hidden">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span>Servidor desconectado</span>
      </div>
    </div>

  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
